<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Triptych</title>
  <style>
    :root {
      --bg: #f4f1e8;
      --ink: #161713;
      --muted: #6e7169;
      --panel: #fffefa;
      --line: #d8d3c6;
      --accent: #1f7a5a;
      --accent-dark: #145840;
      --danger: #9f2b22;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input { font: inherit; }
    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 13px;
      cursor: pointer;
      touch-action: manipulation;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 720;
    }
    button.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    input[type="text"], input[type="number"] {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 11px;
      min-width: 0;
    }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(340px, 460px) 1fr;
    }
    aside {
      min-height: 100vh;
      border-right: 1px solid var(--line);
      background: rgba(255,255,255,.45);
      padding: 26px;
      overflow: auto;
    }
    main {
      min-width: 0;
      padding: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 22px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.12;
      letter-spacing: 0;
    }
    .mark {
      border: 1px solid var(--ink);
      border-radius: 6px;
      padding: 5px 7px 4px;
      font-size: 13px;
      line-height: 1;
      font-weight: 850;
    }
    .field {
      border-top: 1px solid var(--line);
      padding: 17px 0;
    }
    .field:first-of-type { border-top: 0; }
    .label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 760;
    }
    .hint, .status, .note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .facts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: min(100%, 560px);
    }
    .fact {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.5);
      padding: 8px 9px;
      min-width: 0;
    }
    .fact strong {
      display: block;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fact span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
    }
    .drop {
      position: relative;
      min-height: 104px;
      display: grid;
      place-items: center;
      border: 1.5px dashed #aaa695;
      border-radius: 8px;
      background: rgba(255,255,255,.58);
      padding: 18px 16px;
      text-align: center;
      color: var(--muted);
    }
    .drop strong {
      display: block;
      color: var(--ink);
      margin-bottom: 5px;
      font-size: 14px;
    }
    .drop input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .slots, .caption-grid { display: grid; gap: 9px; }
    .slot {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.45);
      border-radius: 8px;
      padding: 8px;
    }
    .chip {
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--panel);
      font-size: 12px;
      font-weight: 800;
    }
    .name {
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pick {
      position: relative;
      overflow: hidden;
      min-width: 74px;
    }
    .pick input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .segment, .caption-row {
      display: grid;
      grid-template-columns: 34px 1fr 52px;
      gap: 10px;
      align-items: center;
      margin-top: 9px;
    }
    .value {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }
    .status-panel {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.5);
      padding: 10px;
    }
    .status {
      min-height: 18px;
      color: var(--muted);
    }
    .status.error { color: var(--danger); }
    .status.success { color: var(--accent-dark); }
    .status.busy { color: var(--ink); }
    .progress {
      display: none;
      margin-top: 9px;
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(31,122,90,.14);
    }
    .progress.show { display: block; }
    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width .18s ease;
    }
    .progress.indeterminate .progress-bar {
      width: 42%;
      animation: progressSlide 1.15s ease-in-out infinite;
    }
    @keyframes progressSlide {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(260%); }
    }
    .stage {
      width: min(100%, 760px);
      display: grid;
      gap: 14px;
      justify-items: center;
    }
    .preview-wrap {
      width: min(100%, 560px);
      display: grid;
      place-items: center;
    }
    canvas {
      width: auto;
      max-width: 100%;
      max-height: calc(100vh - 92px);
      border: 1px solid rgba(0,0,0,.12);
      background: #fff;
      box-shadow: 0 24px 70px rgba(0,0,0,.16);
    }
    video { display: none; }
    @media (max-width: 860px) {
      body { background: #eee9dc; }
      .shell {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        padding-bottom: calc(128px + env(safe-area-inset-bottom));
      }
      aside {
        order: 1;
        min-height: auto;
        border-right: 0;
        border-bottom: 0;
        padding: 18px;
      }
      main {
        order: 2;
        padding: 18px 14px 24px;
        align-items: start;
        border-top: 1px solid rgba(0,0,0,.12);
      }
      .brand {
        margin-bottom: 12px;
      }
      .preview-wrap {
        width: min(100%, 310px);
      }
      canvas {
        max-height: 52vh;
        box-shadow: 0 14px 34px rgba(0,0,0,.14);
      }
      .note {
        display: none;
      }
      .facts {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        width: min(100%, 310px);
      }
      .actions {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 10;
        grid-template-columns: 1fr 1fr;
        padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
        margin: 0;
        background: rgba(244,241,232,.96);
        border-top: 1px solid var(--line);
        backdrop-filter: blur(16px);
      }
      .actions button {
        min-height: 46px;
      }
      .status-panel {
        position: fixed;
        left: 0;
        right: 0;
        bottom: calc(67px + env(safe-area-inset-bottom));
        z-index: 10;
        margin: 0;
        padding: 10px 16px;
        border-left: 0;
        border-right: 0;
        border-radius: 0;
        background: rgba(244,241,232,.96);
        backdrop-filter: blur(16px);
      }
    }
    @media (max-width: 520px) {
      aside { padding: 16px; }
      .row { grid-template-columns: 1fr; }
      h1 { font-size: 21px; }
      .field { padding: 14px 0; }
      .drop { min-height: 92px; padding: 16px 12px; }
      .slot {
        grid-template-columns: 30px 1fr 68px;
        gap: 8px;
      }
      .segment, .caption-row {
        grid-template-columns: 30px 1fr 48px;
        gap: 8px;
      }
      .chip {
        height: 28px;
      }
      .preview-wrap {
        width: min(100%, 245px);
      }
      .facts {
        width: min(100%, 245px);
        gap: 6px;
      }
      .fact {
        padding: 7px 6px;
      }
      .fact strong { font-size: 12px; }
      .fact span { font-size: 10px; }
      canvas {
        max-height: 46vh;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <div class="brand">
        <h1>Live Triptych<br>动态三视频拼接</h1>
        <div class="mark">MP4</div>
      </div>

      <div class="field">
        <div class="drop">
          <input id="multiFiles" type="file" accept="video/*,.mov,.mp4,.m4v" multiple>
          <div>
            <strong>一次选择 3 个 MOV/MP4</strong>
            <span>单个视频不超过 120MB / 30 秒，按文件名顺序放到上、中、下。</span>
          </div>
        </div>
      </div>

      <div class="field">
        <div class="label">视频位置 <span class="hint" id="loadHint">0 / 3</span></div>
        <div class="slots">
          <div class="slot"><span class="chip">上</span><span class="name" id="nameA">未选择</span><button class="pick" type="button">选择<input id="fileA" type="file" accept="video/*,.mov,.mp4,.m4v"></button></div>
          <div class="slot"><span class="chip">中</span><span class="name" id="nameB">未选择</span><button class="pick" type="button">选择<input id="fileB" type="file" accept="video/*,.mov,.mp4,.m4v"></button></div>
          <div class="slot"><span class="chip">下</span><span class="name" id="nameC">未选择</span><button class="pick" type="button">选择<input id="fileC" type="file" accept="video/*,.mov,.mp4,.m4v"></button></div>
        </div>
      </div>

      <div class="field">
        <div class="label">各视频起点 <span class="hint">按各自长度百分比</span></div>
        <div class="segment"><span class="chip">上</span><input id="startA" type="range" min="0" max="1000" value="0"><span class="value" id="startAValue">0%</span></div>
        <div class="segment"><span class="chip">中</span><input id="startB" type="range" min="0" max="1000" value="0"><span class="value" id="startBValue">0%</span></div>
        <div class="segment"><span class="chip">下</span><input id="startC" type="range" min="0" max="1000" value="0"><span class="value" id="startCValue">0%</span></div>
      </div>

      <div class="field">
        <div class="label">字幕水印 <span class="hint">中英文数字，最多 18 字</span></div>
        <div class="caption-grid">
          <div class="caption-row"><span class="chip">上</span><input id="captionA" type="text" maxlength="18" placeholder="输入上方字幕"><span class="value" id="captionAValue">0/18</span></div>
          <div class="caption-row"><span class="chip">中</span><input id="captionB" type="text" maxlength="18" placeholder="输入中间字幕"><span class="value" id="captionBValue">0/18</span></div>
          <div class="caption-row"><span class="chip">下</span><input id="captionC" type="text" maxlength="18" placeholder="输入下方字幕"><span class="value" id="captionCValue">0/18</span></div>
        </div>
      </div>

      <div class="field">
        <div class="label">动态参数</div>
        <div class="row">
          <label><span class="hint">片段循环 / 秒</span><input id="clipLength" type="number" min="0.3" max="8" step="0.1" value="3"></label>
          <label><span class="hint">导出时长 / 秒</span><input id="exportLength" type="number" min="1" max="10" step="0.5" value="5"></label>
        </div>
      </div>

      <div class="actions">
        <button id="play" type="button">预览</button>
        <button id="download" class="primary" type="button">导出 MP4</button>
      </div>
      <div class="status-panel" aria-live="polite">
        <div class="status" id="status">选择 3 个视频开始制作。</div>
        <div class="progress" id="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </aside>

    <main>
      <div class="stage">
        <div class="preview-wrap">
          <canvas id="canvas" width="1080" height="1920"></canvas>
        </div>
        <div class="facts">
          <div class="fact"><strong id="factSource">0/3 视频</strong><span>素材状态</span></div>
          <div class="fact"><strong id="factOutput">1080×1920</strong><span>H.264 MP4</span></div>
          <div class="fact"><strong id="factLimit">≤120MB</strong><span>每个 ≤30秒</span></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const progressEl = document.getElementById('progress');
    const progressBar = document.getElementById('progressBar');
    const factSource = document.getElementById('factSource');
    const factOutput = document.getElementById('factOutput');
    const factLimit = document.getElementById('factLimit');
    const loadHint = document.getElementById('loadHint');
    const playBtn = document.getElementById('play');
    const downloadBtn = document.getElementById('download');
    const multiFiles = document.getElementById('multiFiles');
    const fileInputs = ['fileA', 'fileB', 'fileC'].map(id => document.getElementById(id));
    const nameEls = ['nameA', 'nameB', 'nameC'].map(id => document.getElementById(id));
    const startSliders = ['startA', 'startB', 'startC'].map(id => document.getElementById(id));
    const startValues = ['startAValue', 'startBValue', 'startCValue'].map(id => document.getElementById(id));
    const captionInputs = ['captionA', 'captionB', 'captionC'].map(id => document.getElementById(id));
    const captionValues = ['captionAValue', 'captionBValue', 'captionCValue'].map(id => document.getElementById(id));
    const labels = ['上', '中', '下'];
    const MAX_VIDEO_MB = 120;
    const MAX_VIDEO_BYTES = MAX_VIDEO_MB * 1024 * 1024;
    const MAX_VIDEO_SECONDS = 30;
    const MAX_TOTAL_MB = 380;
    const MAX_TOTAL_BYTES = MAX_TOTAL_MB * 1024 * 1024;
    let slots = Array.from({ length: 3 }, () => ({ file: null, url: '', video: null, duration: 0 }));
    let playing = false;
    let rafId = 0;

    function setStatus(text, state = 'idle') {
      statusEl.textContent = text;
      statusEl.className = `status ${state}`;
    }
    function setProgress(percent = 0, mode = 'hidden') {
      progressEl.classList.toggle('show', mode !== 'hidden');
      progressEl.classList.toggle('indeterminate', mode === 'indeterminate');
      progressBar.style.width = mode === 'determinate' ? `${clamp(percent, 0, 100)}%` : '';
    }
    function setProcessing(isProcessing) {
      downloadBtn.disabled = isProcessing || !isReady();
      playBtn.disabled = isProcessing || !isReady();
      multiFiles.disabled = isProcessing;
      fileInputs.forEach(input => {
        input.disabled = isProcessing;
      });
    }
    function clamp(value, min, max) {
      if (Number.isNaN(value)) return min;
      return Math.max(min, Math.min(max, value));
    }
    function getClipLength() {
      return clamp(Number(document.getElementById('clipLength').value), 0.3, 8);
    }
    function getExportLength() {
      return clamp(Number(document.getElementById('exportLength').value), 1, 10);
    }
    function formatSize(bytes) {
      return `${(bytes / 1024 / 1024).toFixed(bytes > 10 * 1024 * 1024 ? 0 : 1)}MB`;
    }
    function readyCount() {
      return slots.filter(slot => slot.video && slot.duration > 0).length;
    }
    function isReady() {
      return readyCount() === 3;
    }
    function updateLoadHint() {
      const count = readyCount();
      const totalBytes = slots.reduce((sum, slot) => sum + (slot.file?.size || 0), 0);
      loadHint.textContent = `${count} / 3`;
      factSource.textContent = `${count}/3 视频`;
      factOutput.textContent = `${getExportLength()}秒 MP4`;
      factLimit.textContent = totalBytes ? `${formatSize(totalBytes)} / ${MAX_TOTAL_MB}MB` : `≤${MAX_VIDEO_MB}MB`;
      slots.forEach((slot, index) => {
        nameEls[index].textContent = slot.file && slot.duration ? `${slot.file.name} · ${slot.duration.toFixed(1)}s · ${formatSize(slot.file.size)}` : '未选择';
      });
      downloadBtn.disabled = !isReady();
      playBtn.disabled = !isReady();
    }
    function getStart(index) {
      const maxStart = Math.max(0, (slots[index].duration || 0) - getClipLength() - 0.03);
      return maxStart * (Number(startSliders[index].value) / 1000);
    }
    function syncLabels() {
      startSliders.forEach((slider, index) => {
        startValues[index].textContent = `${Math.round(Number(slider.value) / 10)}%`;
      });
    }
    function sanitizeCaption(value) {
      return Array.from(value).filter(char => /[A-Za-z0-9\u4e00-\u9fff ]/.test(char)).slice(0, 18).join('');
    }
    function syncCaptionCounts() {
      captionInputs.forEach((input, index) => {
        captionValues[index].textContent = `${Array.from(input.value).length}/18`;
      });
    }
    function coverDraw(source, x, y, w, h) {
      const sw = source.videoWidth || 1;
      const sh = source.videoHeight || 1;
      const scale = Math.max(w / sw, h / sh);
      const dw = sw * scale;
      const dh = sh * scale;
      ctx.save();
      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.clip();
      ctx.drawImage(source, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
      ctx.restore();
    }
    function drawCaption(text, x, y, w, h) {
      if (!text) return;
      const fontSize = clamp(Math.round(h * 0.058), 24, 38);
      const baseline = y + h - Math.max(38, h * 0.075);
      const gradient = ctx.createLinearGradient(0, y + h * 0.58, 0, y + h);
      gradient.addColorStop(0, 'rgba(0,0,0,0)');
      gradient.addColorStop(0.55, 'rgba(0,0,0,0.26)');
      gradient.addColorStop(1, 'rgba(0,0,0,0.58)');
      ctx.fillStyle = gradient;
      ctx.fillRect(x, y + h * 0.58, w, h * 0.42);
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = `500 ${fontSize}px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
      ctx.shadowColor = 'rgba(0,0,0,0.58)';
      ctx.shadowBlur = 12;
      ctx.shadowOffsetY = 4;
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.fillText(text, x + w / 2, baseline);
      ctx.restore();
    }
    function drawPlaceholder() {
      canvas.width = 1080;
      canvas.height = 1920;
      ctx.fillStyle = '#fffefa';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#161713';
      ctx.textAlign = 'center';
      ctx.font = '760 54px system-ui, sans-serif';
      ctx.fillText('选择 3 个 MOV 视频', canvas.width / 2, canvas.height / 2 - 28);
      ctx.fillStyle = '#6e7169';
      ctx.font = '30px system-ui, sans-serif';
      ctx.fillText('导出为可分享的 MP4', canvas.width / 2, canvas.height / 2 + 34);
    }
    function drawFrame() {
      canvas.width = 1080;
      canvas.height = 1920;
      const frameH = canvas.height / 3;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      slots.forEach((slot, index) => {
        const y = index * frameH;
        if (slot.video && slot.duration) {
          coverDraw(slot.video, 0, y, canvas.width, frameH);
          drawCaption(captionInputs[index].value.trim(), 0, y, canvas.width, frameH);
        } else {
          ctx.fillStyle = '#ebe6d8';
          ctx.fillRect(0, y, canvas.width, frameH);
          ctx.fillStyle = '#6e7169';
          ctx.textAlign = 'center';
          ctx.font = '700 30px system-ui, sans-serif';
          ctx.fillText(`选择${labels[index]}方视频`, canvas.width / 2, y + frameH / 2 + 10);
        }
      });
    }
    function loopSegments() {
      if (!playing) return;
      slots.forEach((slot, index) => {
        if (!slot.video) return;
        const start = getStart(index);
        const end = Math.min(slot.duration, start + getClipLength());
        if (slot.video.currentTime >= end || slot.video.currentTime < start) slot.video.currentTime = start;
      });
      drawFrame();
      rafId = requestAnimationFrame(loopSegments);
    }
    function seekVideo(video, time, duration) {
      return new Promise((resolve, reject) => {
        const done = () => { video.removeEventListener('seeked', done); resolve(); };
        const fail = () => { video.removeEventListener('error', fail); reject(new Error('视频读取失败')); };
        video.addEventListener('seeked', done, { once: true });
        video.addEventListener('error', fail, { once: true });
        video.currentTime = Math.min(Math.max(time, 0), Math.max(duration - 0.03, 0));
      });
    }
    async function resetSegments() {
      await Promise.all(slots.map((slot, index) => slot.video ? seekVideo(slot.video, getStart(index), slot.duration) : Promise.resolve()));
      drawFrame();
    }
    function pausePreview(message = '已暂停预览。') {
      playing = false;
      playBtn.textContent = '预览';
      cancelAnimationFrame(rafId);
      slots.forEach(slot => { if (slot.video) slot.video.pause(); });
      setStatus(message);
    }
    async function startPreview() {
      if (!isReady()) {
        setStatus('先把上、中、下三个视频都选好。', 'error');
        return;
      }
      playing = true;
      playBtn.textContent = '暂停';
      await resetSegments();
      await Promise.all(slots.map(slot => slot.video.play()));
      cancelAnimationFrame(rafId);
      loopSegments();
      setStatus('正在预览。', 'busy');
    }
    async function loadFileIntoSlot(index, file) {
      if (!file) return;
      if (!file.type.startsWith('video/') && !/\.(mov|mp4|m4v)$/i.test(file.name)) {
        setStatus('这里只接受 MOV/MP4/M4V 视频。', 'error');
        return;
      }
      if (file.size > MAX_VIDEO_BYTES) {
        setStatus(`${labels[index]}方视频太大：${formatSize(file.size)}，单个视频上限 ${MAX_VIDEO_MB}MB。`, 'error');
        return;
      }
      const wasPlaying = playing;
      pausePreview('正在读取视频...');
      const oldSlot = slots[index];
      if (oldSlot.url) URL.revokeObjectURL(oldSlot.url);
      if (oldSlot.video) oldSlot.video.remove();
      const url = URL.createObjectURL(file);
      const video = document.createElement('video');
      video.src = url;
      video.muted = true;
      video.playsInline = true;
      video.preload = 'auto';
      document.body.appendChild(video);
      await new Promise((resolve, reject) => {
        video.onloadedmetadata = resolve;
        video.onerror = reject;
        video.load();
      });
      if ((video.duration || 0) > MAX_VIDEO_SECONDS) {
        URL.revokeObjectURL(url);
        video.remove();
        setStatus(`${labels[index]}方视频太长：${video.duration.toFixed(1)} 秒，单个视频上限 ${MAX_VIDEO_SECONDS} 秒。`, 'error');
        return;
      }
      slots[index] = { file, url, video, duration: video.duration || 0 };
      updateLoadHint();
      await resetSegments();
      setStatus(`已载入${labels[index]}方视频。`);
      if (wasPlaying && isReady()) startPreview();
    }
    async function loadMultiple(files) {
      const picked = Array.from(files).filter(file => file.type.startsWith('video/') || /\.(mov|mp4|m4v)$/i.test(file.name));
      if (picked.length < 3) {
        setStatus('请一次选择至少 3 个 MOV/MP4。', 'error');
        return;
      }
      picked.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
      const selected = picked.slice(0, 3);
      const totalBytes = selected.reduce((sum, file) => sum + file.size, 0);
      if (totalBytes > MAX_TOTAL_BYTES) {
        setStatus(`3 个视频合计 ${formatSize(totalBytes)}，总上限 ${MAX_TOTAL_MB}MB。`, 'error');
        return;
      }
      for (let i = 0; i < 3; i += 1) await loadFileIntoSlot(i, picked[i]);
      setStatus('三个视频已按文件名顺序放入上、中、下。');
    }
    async function exportMp4() {
      if (!isReady()) {
        setStatus('先把上、中、下三个视频都选好。', 'error');
        return;
      }
      const wasPlaying = playing;
      pausePreview('正在上传并渲染 MP4...');
      setProcessing(true);
      setProgress(0, 'determinate');
      const form = new FormData();
      form.append('top', slots[0].file);
      form.append('middle', slots[1].file);
      form.append('bottom', slots[2].file);
      form.append('clipLength', String(getClipLength()));
      form.append('exportLength', String(getExportLength()));
      slots.forEach((slot, index) => form.append(`start${index}`, String(getStart(index))));
      captionInputs.forEach((input, index) => form.append(`caption${index}`, input.value.trim()));
      try {
        const blob = await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('POST', '/api/render');
          xhr.responseType = 'blob';
          xhr.upload.onprogress = event => {
            if (!event.lengthComputable) {
              setStatus('正在上传视频...', 'busy');
              return;
            }
            const percent = Math.round((event.loaded / event.total) * 100);
            setStatus(`正在上传视频 ${percent}%`, 'busy');
            setProgress(percent, 'determinate');
          };
          xhr.upload.onload = () => {
            setStatus('上传完成，正在渲染 MP4...', 'busy');
            setProgress(100, 'indeterminate');
          };
          xhr.onload = async () => {
            if (xhr.status >= 200 && xhr.status < 300) {
              resolve(xhr.response);
              return;
            }
            if (xhr.response && xhr.response.type.includes('application/json')) {
              const text = await xhr.response.text();
              try {
                reject(new Error(JSON.parse(text).error || '导出失败。'));
              } catch {
                reject(new Error('导出失败。'));
              }
              return;
            }
            reject(new Error('导出失败。'));
          };
          xhr.onerror = () => reject(new Error('网络连接失败，请重试。'));
          xhr.send(form);
        });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `live-triptych-${Date.now()}.mp4`;
        link.click();
        setTimeout(() => URL.revokeObjectURL(link.href), 1500);
        setStatus('MP4 导出完成。', 'success');
        setProgress(100, 'determinate');
      } catch (error) {
        setStatus(error.message || '导出失败。', 'error');
        setProgress(0, 'hidden');
      } finally {
        setProcessing(false);
        if (wasPlaying) startPreview();
      }
    }

    multiFiles.addEventListener('change', event => loadMultiple(event.target.files).catch(error => setStatus(error.message, 'error')));
    fileInputs.forEach((input, index) => input.addEventListener('change', event => loadFileIntoSlot(index, event.target.files[0]).catch(error => setStatus(error.message, 'error'))));
    startSliders.forEach(slider => slider.addEventListener('input', () => { syncLabels(); resetSegments().catch(() => {}); }));
    captionInputs.forEach(input => input.addEventListener('input', () => {
      const cleaned = sanitizeCaption(input.value);
      if (input.value !== cleaned) input.value = cleaned;
      syncCaptionCounts();
      drawFrame();
    }));
    ['clipLength', 'exportLength'].forEach(id => document.getElementById(id).addEventListener('input', () => {
      updateLoadHint();
      resetSegments().catch(() => drawFrame());
    }));
    playBtn.addEventListener('click', () => playing ? pausePreview() : startPreview().catch(error => setStatus(error.message, 'error')));
    downloadBtn.addEventListener('click', () => exportMp4());

    syncLabels();
    syncCaptionCounts();
    updateLoadHint();
    drawPlaceholder();
  </script>
</body>
</html>
